<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    style-src carries 'unsafe-inline' only because of Monaco Editor (the
    sketch panel's code editor, src/sketch-editor.ts): its theming engine
    injects a <style> tag with dynamically-computed CSS at runtime, and
    there is no working nonce-based alternative today - a long-standing,
    still-open upstream limitation (microsoft/monaco-editor#271, #4927),
    confirmed by checking rather than assumed. Deliberately scoped to
    style-src only: script-src stays 'self' (no inline scripts, no eval),
    object-src/base-uri/frame-ancestors stay locked down. Low-risk here
    specifically because physicalsim binds to 127.0.0.1 only (src/main.cpp)
    - not a page serving untrusted remote content to third parties.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
  <meta name="referrer" content="no-referrer">
  <title>physicalsim - v0.1.0</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <!-- Version is hardcoded, not build-injected - keep in sync with
           PHYSICALSIM_VERSION in src/main.cpp when it changes. -->
      <h1>physicalsim <span class="version">v0.1.0</span></h1>
    </header>

    <div class="body">
      <!-- The "activity bar" (VS Code convention) - every quick-access
           control for running a sketch, in one place, top-down: Compile &
           Run, Start/Pause/Stop, then Load .hex… (a separator apart from
           the other four - it loads *pre-compiled* firmware, not the
           editor's own sketch). This is now the *only* place Start/Pause/
           Stop and Load .hex… live - the simulator overlay on the canvas
           (below) used to duplicate them, back when it also held the
           board picker/Apply; now that boards are always placed by
           picking an Example (main.ts's EXAMPLES table), that picker is
           gone too, and the overlay is purely a state/energy readout. -->
      <nav class="icon-rail">
        <button id="rail-compile-btn" type="button" title="Compile & Run sketch">
          <svg class="icon rail-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14,12.94c0.04,-0.3,0.06,-0.61,0.06,-0.94c0,-0.32,-0.02,-0.64,-0.07,-0.94l2.03,-1.58c0.18,-0.14,0.23,-0.41,0.12,-0.61l-1.92,-3.32c-0.12,-0.22,-0.37,-0.29,-0.59,-0.22l-2.39,0.96c-0.5,-0.38,-1.03,-0.7,-1.62,-0.94L14.4,2.81c-0.04,-0.24,-0.24,-0.41,-0.48,-0.41h-3.84c-0.24,0,-0.43,0.17,-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22,-0.08,-0.47,0,-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14,-0.23,0.41,-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39,-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44,-0.17,0.47,-0.41l0.36,-2.54c0.59,-0.24,1.13,-0.56,1.62,-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59,-0.22l1.92,-3.32c0.12,-0.22,0.07,-0.47,-0.12,-0.61L19.14,12.94z M12,15.6c-1.98,0,-3.6,-1.62,-3.6,-3.6s1.62,-3.6,3.6,-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
        </button>
        <button id="rail-run-btn" type="button" title="Start">
          <svg class="icon rail-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M232.4,114.49,88.32,26.35a16,16,0,0,0-16.2-.3A15.86,15.86,0,0,0,64,39.87V216.13A15.94,15.94,0,0,0,80,232a16.07,16.07,0,0,0,8.36-2.35L232.4,141.51a15.81,15.81,0,0,0,0-27ZM80,215.94V40l143.83,88Z"/></svg>
        </button>
        <button id="rail-pause-btn" type="button" title="Pause">
          <svg class="icon rail-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M200,32H160a16,16,0,0,0-16,16V208a16,16,0,0,0,16,16h40a16,16,0,0,0,16-16V48A16,16,0,0,0,200,32Zm0,176H160V48h40ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Zm0,176H56V48H96Z"/></svg>
        </button>
        <button id="rail-stop-btn" type="button" title="Stop">
          <svg class="icon rail-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M200,40H56A16,16,0,0,0,40,56V200a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V56A16,16,0,0,0,200,40Zm0,160H56V56H200V200Z"/></svg>
        </button>
        <!--
          Stage 2 of the terminal feature (see ARCHITECTURE.md's "Firmware
          loading" section) - loads a compiled Intel HEX file into the
          placed board's flash and reboots into it, independent of the
          sketch editor/compiler above. The file input is hidden and
          triggered by the button so no browser-default file-picker chrome
          shows up on the rail.
        -->
        <button id="load-firmware-btn" type="button" title="Load a compiled .hex file">
          <svg class="icon rail-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0ZM93.66,77.66,120,51.31V144a8,8,0,0,0,16,0V51.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,77.66Z"/></svg>
        </button>
        <input id="firmware-file-input" type="file" accept=".hex" hidden>
      </nav>

      <!--
        The whole left bar (next to the icon-rail): a code editor, nothing
        else - Simulator controls/status used to be squeezed in here as
        separate side-by-side sections (a layout bug: .tab-pane is a flex
        *row*, so what looked like "stacked panels" actually rendered as
        three narrow columns crammed against the canvas). Those moved to
        .simulator-overlay, floating on the canvas itself (the "simulator
        rectangle") below - this column is purely "write code, test it".
        Status text (board-placed, firmware-load, compile results, …) all
        goes to the Serial Monitor now (main.ts's logLine() writes there,
        not to any element here) - nothing prints on top of the editor.
      -->
      <aside class="sidebar">
        <!--
          Examples (main.ts's EXAMPLES table): a canvas layout (board +
          wired components) and a matching sketch, loaded together so
          picking one leaves the circuit already built and the code
          already correct - just Compile & Run, then Start. The default
          ("led-blink") also loads automatically on startup (see main.ts's
          bottom), so a fresh launch already has something wired rather
          than an empty canvas; this button just reopens the same gallery
          (#example-gallery-overlay below) to pick a different one. Sits
          above the editor, not in the simulator overlay, since picking an
          example is about the sketch below it as much as the canvas.
        -->
        <button id="open-example-gallery-btn" type="button">Choose Example…</button>

        <!--
          A real code editor (Monaco - src/sketch-editor.ts), not the
          polished multi-file/tabbed experience discussed as future work -
          just syntax highlighting, sane editing, and a small hand-written
          autocomplete list for the Arduino core, enough to write/edit a
          real sketch and re-test it without leaving the app. Compile &
          Run itself lives only on the icon-rail now (rail-compile-btn) -
          posts the source to the native shell's /compile endpoint
          (src/avr_toolchain.cpp, which shells out to a bundled/system
          avr-gcc), then feeds the resulting .hex through the exact same
          parseIntelHex() -> loadFirmware() path "Load .hex…" already uses
          (see main.ts).
        -->
        <section class="panel sketch-panel">
          <label id="sketch-editor-label">Sketch (Arduino Uno)</label>
          <!-- Monaco mounts into this div (SketchEditor, src/sketch-editor.ts) -
               sized by the same .sidebar .sketch-panel flex layout the
               textarea used to fill, with Monaco's own automaticLayout
               reacting to resizes (including dragging #sidebar-resize-handle)
               instead of a CSS flex:1 on the element itself. -->
          <div id="sketch-editor" aria-labelledby="sketch-editor-label"></div>
        </section>
      </aside>

      <!-- Drag left/right to resize .sidebar (main.ts's bindSidebarResize()) -
           persisted like the theme/chrome-hidden toggles below. -->
      <div id="sidebar-resize-handle" class="sidebar-resize-handle" title="Drag to resize"></div>

      <main class="workspace">
        <nav class="tabs" id="board-tabs">
          <button class="tab-btn active" type="button" data-tab="tab1">tab 1</button>
          <button class="tab-btn" type="button" data-tab="tab2">tab 2</button>
          <button class="tab-btn" type="button" data-tab="tab3">tab 3</button>
        </nav>

        <div class="tab-pane active" data-tab="tab1">
          <div class="tab1-canvas-area">
            <!-- The canvas proper and its overlays (simulator controls,
                 minimap/zoom) - a separate positioning context from the
                 terminal panel below, so the overlays' pins stay relative
                 to *this* (the canvas), not shifted by however tall the
                 terminal panel happens to be. -->
            <div class="tab1-canvas-and-overlay">
              <div id="canvas-tab1" class="board-canvas board-canvas-full board-canvas-interactive">
                <!-- Placed boards/components live inside this inner layer,
                     not directly in #canvas-tab1 - canvas/viewport.ts pans/
                     scales this element alone via CSS transform, leaving
                     #canvas-tab1 itself (border, grid background) fixed. -->
                <div id="tab1-content" class="tab1-content"></div>
              </div>

              <!--
                Pinned top-left of the canvas - a pure state/energy
                readout now, nothing else: no board picker (a board is
                always placed by picking an Example - main.ts's EXAMPLES
                table - not a dropdown+Apply here anymore), no Start/
                Pause/Stop (moved to the icon-rail activity bar, next to
                the sidebar, so they're not tucked into a floating panel
                on the canvas), no Load .hex… (moved there too). Just
                text and numbers reflecting whatever's currently running.
              -->
              <section class="panel simulator-overlay">
                <dl id="state-list" class="readout">
                  <dt>status</dt><dd id="state-running">idle</dd>
                  <dt>cycles</dt><dd id="state-cycles">0</dd>
                  <dt>pc</dt><dd id="state-pc">0x0</dd>
                </dl>

                <!--
                  A second, separate model from the state readout above -
                  see ARCHITECTURE.md's "Energy model" section. Nominal
                  values only (not a real circuit-topology solve): 0
                  whenever the board isn't powered, a fixed per-board-type
                  voltage and an idle/running current estimate otherwise.
                -->
                <dl id="energy-list" class="readout">
                  <dt>voltage</dt><dd id="energy-voltage">0.0 V</dd>
                  <dt>current</dt><dd id="energy-current">0 mA</dd>
                  <dt>power</dt><dd id="energy-power">0 mW</dd>
                </dl>
              </section>

              <!-- Pinned bottom-right of the canvas, stacked: minimap on
                   top of the zoom controls, same rendered width as the
                   controls row (main.ts sizes #minimap to match). -->
              <div class="canvas-overlay">
                <!-- A miniature top-down view of the whole scene
                     (canvas/minimap.ts) - #minimap-items holds one small
                     marker per placed board/component, #minimap-viewport is
                     the rectangle showing what's currently visible in the
                     real canvas. Click/drag anywhere on it to pan the main
                     view. -->
                <div id="minimap" class="minimap" title="Click or drag to pan">
                  <div id="minimap-items"></div>
                  <div id="minimap-viewport" class="minimap-viewport-rect"></div>
                </div>
                <!-- Zoom controls: -/reset/+. Percentage label doubles as a
                     reset-to-100% button. -->
                <div class="zoom-controls">
                  <button id="zoom-out-btn" type="button" title="Zoom out">-</button>
                  <button id="zoom-reset-btn" type="button" title="Reset zoom">
                    <span id="zoom-level">100%</span>
                  </button>
                  <button id="zoom-in-btn" type="button" title="Zoom in">+</button>
                </div>
              </div>

              <!-- Pinned bottom-left of the canvas - the mirror-image
                   position of .canvas-overlay above. Toggled by the
                   bottombar's #wire-color-toggle-btn; hidden by default
                   (see that button's own comment). Populated from
                   main.ts's WIRE_COLORS, not hardcoded here - one swatch
                   button per color. -->
              <div id="wire-color-panel" class="wire-color-panel hidden" title="Click a color to change every cable's color">
                <div id="wire-color-swatches" class="wire-color-swatches"></div>
              </div>
            </div>

            <!-- Serial Monitor (web/shell/src/terminal.ts) - docked below
                 the canvas, above the app's own bottombar. Visible by
                 default (main.ts's #terminal-toggle-btn hides it
                 entirely); its own collapse button shrinks it to just
                 this header without hiding it, a second, lighter-weight
                 level of "get it out of the way". -->
            <div id="terminal-panel" class="terminal-panel">
              <div class="terminal-header">
                <span class="terminal-title">Serial Monitor</span>
                <div class="terminal-header-actions">
                  <button id="terminal-clear-btn" type="button" title="Clear">Clear</button>
                  <button id="terminal-collapse-btn" type="button" title="Collapse Serial Monitor">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M213.66,101.66l-80,80a8,8,0,0,1-11.32,0l-80-80A8,8,0,0,1,53.66,90.34L128,164.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"/></svg>
                  </button>
                </div>
              </div>
              <div id="terminal-output" class="terminal-output"></div>
            </div>
          </div>
        </div>

        <!-- Deliberately empty - future workspaces with nothing built
             yet, not placeholder canvases drawing a grid no one used. -->
        <div class="tab-pane" data-tab="tab2">
          <div class="tab-blank"></div>
        </div>

        <div class="tab-pane" data-tab="tab3">
          <div class="tab-blank"></div>
        </div>
      </main>
    </div>

    <!-- Full-width, not scoped to .workspace - spans the icon-rail and
         sidebar too, not just the area right of them. A home for canvas-
         wide controls that aren't per-tab: the Serial Monitor visibility
         toggle, rotate-selected, the link-style toggle (cycles how wires
         are drawn), the chrome-visibility toggle (hides the simulator
         overlay + zoom-controls/minimap, leaving just the bare canvas),
         and light/dark. -->
    <div class="bottombar">
      <button id="terminal-toggle-btn" type="button" title="Show/hide Serial Monitor">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M117.31,134l-72,64a8,8,0,1,1-10.63-12L100,128,34.69,70A8,8,0,1,1,45.32,58l72,64a8,8,0,0,1,0,12ZM216,184H120a8,8,0,0,0,0,16h96a8,8,0,0,0,0-16Z"/></svg>
      </button>
      <button id="rotate-btn" type="button" title="Rotate selected element 90° clockwise">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M240,56v48a8,8,0,0,1-8,8H184a8,8,0,0,1,0-16H211.4L184.81,71.64l-.25-.24a80,80,0,1,0-1.67,114.78,8,8,0,0,1,11,11.63A95.44,95.44,0,0,1,128,224h-1.32A96,96,0,1,1,195.75,60L224,85.8V56a8,8,0,1,1,16,0Z"/></svg>
      </button>
      <button id="link-style-btn" type="button" title="Cycle link style (straight/elbow/bezier)">
        <svg id="link-icon-straight" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round"><line x1="48" y1="208" x2="208" y2="48"/></svg>
        <svg id="link-icon-elbow" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M48 208 L128 208 L128 48 L208 48"/></svg>
        <svg id="link-icon-bezier" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" hidden><path d="M48 208 C48 128 208 128 208 48"/></svg>
      </button>
      <!--
        Toggles #wire-color-panel (bottom-left of the canvas, mirroring
        .canvas-overlay's bottom-right minimap/zoom stack) - a 3x3 grid of
        swatches (main.ts's WIRE_COLORS) that set WiringLayer's global
        wire color (canvas/wiring.ts's setColor()), the same "one setting,
        applies to every wire immediately" posture as the link-style
        toggle next to it. Hidden by default (no persisted state, same as
        link-style-btn) - most sessions never need to change it.
        Icon: an original stroke-based glyph (a palette outline + four
        color dots), not a vendored Phosphor icon - matches the existing
        custom-icon precedent the link-style buttons above set for "no
        ready-made icon fits this concept".
      -->
      <button id="wire-color-toggle-btn" type="button" title="Show/hide cable color palette">
        <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="12" stroke-linejoin="round">
          <path d="M128 24c57 0 96 39 96 88 0 30-20 40-40 40h-20c-11 0-16 9-9 18 8 10 2 26-14 30-52 12-101-30-101-88 0-49 39-88 88-88z"/>
          <circle cx="90" cy="92" r="11" fill="currentColor" stroke="none"/>
          <circle cx="140" cy="76" r="11" fill="currentColor" stroke="none"/>
          <circle cx="176" cy="118" r="11" fill="currentColor" stroke="none"/>
          <circle cx="92" cy="152" r="11" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button id="panel-toggle-btn" type="button" title="Show/hide panel and zoom controls">
        <svg id="panel-icon-visible" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M247.31,124.76c-.35-.79-8.82-19.58-27.65-38.41C194.57,61.26,162.88,48,128,48S61.43,61.26,36.34,86.35C17.51,105.18,9,124,8.69,124.76a8,8,0,0,0,0,6.5c.35.79,8.82,19.57,27.65,38.4C61.43,194.74,93.12,208,128,208s66.57-13.26,91.66-38.34c18.83-18.83,27.3-37.61,27.65-38.4A8,8,0,0,0,247.31,124.76ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.47,133.47,0,0,1,25,128,133.33,133.33,0,0,1,48.07,97.25C70.33,75.19,97.22,64,128,64s57.67,11.19,79.93,33.25A133.46,133.46,0,0,1,231.05,128C223.84,141.46,192.43,192,128,192Zm0-112a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Z"/></svg>
        <svg id="panel-icon-hidden" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" hidden><path d="M53.92,34.62A8,8,0,1,0,42.08,45.38L61.32,66.55C25,88.84,9.38,123.2,8.69,124.76a8,8,0,0,0,0,6.5c.35.79,8.82,19.57,27.65,38.4C61.43,194.74,93.12,208,128,208a127.11,127.11,0,0,0,52.07-10.83l22,24.21a8,8,0,1,0,11.84-10.76Zm47.33,75.84,41.67,45.85a32,32,0,0,1-41.67-45.85ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.16,133.16,0,0,1,25,128c4.69-8.79,19.66-33.39,47.35-49.38l18,19.75a48,48,0,0,0,63.66,70l14.73,16.2A112,112,0,0,1,128,192Zm6-95.43a8,8,0,0,1,3-15.72,48.16,48.16,0,0,1,38.77,42.64,8,8,0,0,1-7.22,8.71,6.39,6.39,0,0,1-.75,0,8,8,0,0,1-8-7.26A32.09,32.09,0,0,0,134,96.57Zm113.28,34.69c-.42.94-10.55,23.37-33.36,43.8a8,8,0,1,1-10.67-11.92A132.77,132.77,0,0,0,231.05,128a133.15,133.15,0,0,0-23.12-30.77C185.67,75.19,158.78,64,128,64a118.37,118.37,0,0,0-19.36,1.57A8,8,0,1,1,106,49.79,134,134,0,0,1,128,48c34.88,0,66.57,13.26,91.66,38.35,18.83,18.83,27.3,37.62,27.65,38.41A8,8,0,0,1,247.31,131.26Z"/></svg>
      </button>
      <button id="theme-toggle-btn" type="button" title="Toggle light/dark interface">

  <!--
    Example gallery (main.ts's renderExampleGallery()/EXAMPLES table) - a
    full-viewport picker shown on startup (after the default example has
    already been built underneath it, so closing without picking still
    leaves a working circuit) and reopenable any time via the sidebar's
    "Choose Example…" button. Sits outside .app (not another
    .simulator-overlay-style absolutely-positioned child of the canvas) so
    it can cover the whole window, tabs and sidebar included, regardless
    of which tab or panel is showing underneath.
  -->
  <div id="example-gallery-overlay" class="example-gallery-overlay hidden">
    <div class="example-gallery" role="dialog" aria-modal="true" aria-labelledby="example-gallery-title">
      <header class="example-gallery-header">
        <h2 id="example-gallery-title">Choose an example</h2>
        <button id="example-gallery-close-btn" type="button" title="Close">✕</button>
      </header>
      <!-- Populated from main.ts's EXAMPLES table, not hardcoded here - one
           .example-card button per entry. -->
      <div id="example-gallery-grid" class="example-gallery-grid"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
