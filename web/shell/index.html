<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
  <meta name="referrer" content="no-referrer">
  <title>physicalsim - v0.1.0</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <!-- Version is hardcoded, not build-injected - keep in sync with
           PHYSICALSIM_VERSION in src/main.cpp when it changes. -->
      <h1>physicalsim <span class="version">v0.1.0</span></h1>
    </header>

    <div class="body">
      <!-- Layout scaffold only - no icons/functionality yet. Reserved for
           navigating between workspaces (circuit canvas, and eventually a
           code editor pane) the way an IDE's activity bar does; nothing
           reads or writes this element today. -->
      <nav class="icon-rail" aria-hidden="true"></nav>

      <aside class="sidebar">
        <output id="log" aria-live="polite"></output>
      </aside>

      <main class="workspace">
        <nav class="tabs" id="board-tabs">
          <button class="tab-btn active" type="button" data-tab="tab1">tab 1</button>
          <button class="tab-btn" type="button" data-tab="tab2">tab 2</button>
          <button class="tab-btn" type="button" data-tab="tab3">tab 3</button>
        </nav>

        <div class="tab-pane active" data-tab="tab1">
          <section class="panel tab1-simulator-panel">
            <label for="adapter-select">Simulator</label>
            <div class="select-row">
              <select id="adapter-select">
                <option value="arduino-uno" selected>Arduino Uno</option>
              </select>
              <button id="apply-btn" type="button">Apply</button>
            </div>

            <!--
              Stage 2 of the terminal feature (see ARCHITECTURE.md's
              "Firmware loading" section) - loads a compiled Intel HEX
              file into the placed board's flash and reboots into it.
              Requires a board already placed via Apply above (there's
              nothing to load firmware into otherwise). The file input is
              hidden and triggered by the button so it can be styled like
              every other control here, rather than showing the browser's
              own default file-picker chrome.
            -->
            <div class="select-row">
              <button id="load-firmware-btn" type="button" title="Load a compiled .hex file">
                <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M224,144v64a8,8,0,0,1-8,8H40a8,8,0,0,1-8-8V144a8,8,0,0,1,16,0v56H208V144a8,8,0,0,1,16,0ZM93.66,77.66,120,51.31V144a8,8,0,0,0,16,0V51.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,77.66Z"/></svg>Load .hex…
              </button>
              <input id="firmware-file-input" type="file" accept=".hex" hidden>
            </div>
          </section>

          <!--
            Deliberately the smallest possible thing, not the polished
            code-editor experience (syntax highlighting, multi-file
            sketches, the icon-rail-driven panel) discussed as future work
            - just enough to write/edit a real Arduino sketch and re-test
            it without leaving the app. "Compile & Run" posts the source to
            the native shell's /compile endpoint (src/avr_toolchain.cpp,
            which shells out to a bundled/system avr-gcc), then feeds the
            resulting .hex through the exact same parseIntelHex() ->
            loadFirmware() path "Load .hex…" already uses (see main.ts).
          -->
          <section class="panel sketch-panel">
            <label for="sketch-source">Sketch (Arduino Uno)</label>
            <textarea id="sketch-source" rows="10" spellcheck="false"
              placeholder="void setup() {&#10;&#10;}&#10;&#10;void loop() {&#10;&#10;}"></textarea>
            <button id="compile-run-btn" type="button">Compile &amp; Run</button>
          </section>

          <section class="panel tab1-simulator-panel">
            <!--
              avr8/rp2040/cortex-m removed from the dropdown - not gone,
              just parked (see adapter-registry.ts, worker-rpc.ts, the
              adapter packages: all untouched). Start/Pause/Stop are
              "power the circuit" for whatever board is placed (see
              main.ts's setPowered()): Start powers on and runs, Pause
              halts execution without losing power (CPU state preserved -
              the adapter's own stop() RPC method never wipes state, only
              halts ticking), Stop powers off for real (adapter reset() -
              which itself calls stop() first - wipes CPU state back to
              power-on defaults, matching what a real board losing power
              would do). Step/Reset buttons removed - Stop now covers
              Reset's job as part of powering off; Step never fit the
              power model.
              Icons: Phosphor Icons (MIT), vendored at
              assets/icons/phosphor/{play,pause,stop}.svg.
            -->
            <div class="controls">
              <button id="start-btn" type="button"><svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M232.4,114.49,88.32,26.35a16,16,0,0,0-16.2-.3A15.86,15.86,0,0,0,64,39.87V216.13A15.94,15.94,0,0,0,80,232a16.07,16.07,0,0,0,8.36-2.35L232.4,141.51a15.81,15.81,0,0,0,0-27ZM80,215.94V40l143.83,88Z"/></svg>Start</button>
              <button id="pause-btn" type="button"><svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M200,32H160a16,16,0,0,0-16,16V208a16,16,0,0,0,16,16h40a16,16,0,0,0,16-16V48A16,16,0,0,0,200,32Zm0,176H160V48h40ZM96,32H56A16,16,0,0,0,40,48V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V48A16,16,0,0,0,96,32Zm0,176H56V48H96Z"/></svg>Pause</button>
              <button id="stop-btn" type="button"><svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M200,40H56A16,16,0,0,0,40,56V200a16,16,0,0,0,16,16H200a16,16,0,0,0,16-16V56A16,16,0,0,0,200,40Zm0,160H56V56H200V200Z"/></svg>Stop</button>
            </div>

            <dl id="state-list" class="readout">
              <dt>status</dt><dd id="state-running">idle</dd>
              <dt>cycles</dt><dd id="state-cycles">0</dd>
              <dt>pc</dt><dd id="state-pc">0x0</dd>
            </dl>

            <!--
              A second, separate model from the state readout above - see
              ARCHITECTURE.md's "Energy model" section. Nominal values
              only (not a real circuit-topology solve): 0 whenever the
              board isn't powered, a fixed per-board-type voltage and an
              idle/running current estimate otherwise.
            -->
            <dl id="energy-list" class="readout">
              <dt>voltage</dt><dd id="energy-voltage">0.0 V</dd>
              <dt>current</dt><dd id="energy-current">0 mA</dd>
              <dt>power</dt><dd id="energy-power">0 mW</dd>
            </dl>
          </section>

          <div class="tab1-canvas-area">
            <!-- The canvas proper and its overlay (minimap/zoom) - a
                 separate positioning context from the terminal panel
                 below, so .canvas-overlay's bottom-right pin stays
                 relative to *this* (the canvas), not shifted by however
                 tall the terminal panel happens to be. -->
            <div class="tab1-canvas-and-overlay">
              <div id="canvas-tab1" class="board-canvas board-canvas-full board-canvas-interactive">
                <!-- Placed boards/components live inside this inner layer,
                     not directly in #canvas-tab1 - canvas/viewport.ts pans/
                     scales this element alone via CSS transform, leaving
                     #canvas-tab1 itself (border, grid background) fixed. -->
                <div id="tab1-content" class="tab1-content"></div>
              </div>
              <!-- Pinned bottom-right of the canvas, stacked: minimap on
                   top of the zoom controls, same rendered width as the
                   controls row (main.ts sizes #minimap to match). -->
              <div class="canvas-overlay">
                <!-- A miniature top-down view of the whole scene
                     (canvas/minimap.ts) - #minimap-items holds one small
                     marker per placed board/component, #minimap-viewport is
                     the rectangle showing what's currently visible in the
                     real canvas. Click/drag anywhere on it to pan the main
                     view. -->
                <div id="minimap" class="minimap" title="Click or drag to pan">
                  <div id="minimap-items"></div>
                  <div id="minimap-viewport" class="minimap-viewport-rect"></div>
                </div>
                <!-- Zoom controls: -/reset/+. Percentage label doubles as a
                     reset-to-100% button. -->
                <div class="zoom-controls">
                  <button id="zoom-out-btn" type="button" title="Zoom out">-</button>
                  <button id="zoom-reset-btn" type="button" title="Reset zoom">
                    <span id="zoom-level">100%</span>
                  </button>
                  <button id="zoom-in-btn" type="button" title="Zoom in">+</button>
                </div>
              </div>
            </div>

            <!-- Serial Monitor (web/shell/src/terminal.ts) - docked below
                 the canvas, above the app's own bottombar. Visible by
                 default (main.ts's #terminal-toggle-btn hides it
                 entirely); its own collapse button shrinks it to just
                 this header without hiding it, a second, lighter-weight
                 level of "get it out of the way". -->
            <div id="terminal-panel" class="terminal-panel">
              <div class="terminal-header">
                <span class="terminal-title">Serial Monitor</span>
                <div class="terminal-header-actions">
                  <button id="terminal-clear-btn" type="button" title="Clear">Clear</button>
                  <button id="terminal-collapse-btn" type="button" title="Collapse Serial Monitor">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M213.66,101.66l-80,80a8,8,0,0,1-11.32,0l-80-80A8,8,0,0,1,53.66,90.34L128,164.69l74.34-74.35a8,8,0,0,1,11.32,11.32Z"/></svg>
                  </button>
                </div>
              </div>
              <div id="terminal-output" class="terminal-output"></div>
            </div>
          </div>
        </div>

        <!-- Deliberately empty - future workspaces with nothing built
             yet, not placeholder canvases drawing a grid no one used. -->
        <div class="tab-pane" data-tab="tab2">
          <div class="tab-blank"></div>
        </div>

        <div class="tab-pane" data-tab="tab3">
          <div class="tab-blank"></div>
        </div>

        <!-- Same height as .tabs (the top tab bar) - a home for canvas-
             wide controls that aren't per-tab: the Serial Monitor
             visibility toggle, rotate-selected, the link-style toggle
             (cycles how wires are drawn), the chrome-visibility toggle
             (hides the simulator panel + zoom-controls/minimap, leaving
             just the bare canvas), and light/dark. -->
        <div class="bottombar">
          <button id="terminal-toggle-btn" type="button" title="Show/hide Serial Monitor">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M117.31,134l-72,64a8,8,0,1,1-10.63-12L100,128,34.69,70A8,8,0,1,1,45.32,58l72,64a8,8,0,0,1,0,12ZM216,184H120a8,8,0,0,0,0,16h96a8,8,0,0,0,0-16Z"/></svg>
          </button>
          <button id="rotate-btn" type="button" title="Rotate selected element 90° clockwise">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M240,56v48a8,8,0,0,1-8,8H184a8,8,0,0,1,0-16H211.4L184.81,71.64l-.25-.24a80,80,0,1,0-1.67,114.78,8,8,0,0,1,11,11.63A95.44,95.44,0,0,1,128,224h-1.32A96,96,0,1,1,195.75,60L224,85.8V56a8,8,0,1,1,16,0Z"/></svg>
          </button>
          <button id="link-style-btn" type="button" title="Cycle link style (straight/elbow/bezier)">
            <svg id="link-icon-straight" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round"><line x1="48" y1="208" x2="208" y2="48"/></svg>
            <svg id="link-icon-elbow" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" hidden><path d="M48 208 L128 208 L128 48 L208 48"/></svg>
            <svg id="link-icon-bezier" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" hidden><path d="M48 208 C48 128 208 128 208 48"/></svg>
          </button>
          <button id="panel-toggle-btn" type="button" title="Show/hide panel and zoom controls">
            <svg id="panel-icon-visible" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M247.31,124.76c-.35-.79-8.82-19.58-27.65-38.41C194.57,61.26,162.88,48,128,48S61.43,61.26,36.34,86.35C17.51,105.18,9,124,8.69,124.76a8,8,0,0,0,0,6.5c.35.79,8.82,19.57,27.65,38.4C61.43,194.74,93.12,208,128,208s66.57-13.26,91.66-38.34c18.83-18.83,27.3-37.61,27.65-38.4A8,8,0,0,0,247.31,124.76ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.47,133.47,0,0,1,25,128,133.33,133.33,0,0,1,48.07,97.25C70.33,75.19,97.22,64,128,64s57.67,11.19,79.93,33.25A133.46,133.46,0,0,1,231.05,128C223.84,141.46,192.43,192,128,192Zm0-112a48,48,0,1,0,48,48A48.05,48.05,0,0,0,128,80Zm0,80a32,32,0,1,1,32-32A32,32,0,0,1,128,160Z"/></svg>
            <svg id="panel-icon-hidden" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" hidden><path d="M53.92,34.62A8,8,0,1,0,42.08,45.38L61.32,66.55C25,88.84,9.38,123.2,8.69,124.76a8,8,0,0,0,0,6.5c.35.79,8.82,19.57,27.65,38.4C61.43,194.74,93.12,208,128,208a127.11,127.11,0,0,0,52.07-10.83l22,24.21a8,8,0,1,0,11.84-10.76Zm47.33,75.84,41.67,45.85a32,32,0,0,1-41.67-45.85ZM128,192c-30.78,0-57.67-11.19-79.93-33.25A133.16,133.16,0,0,1,25,128c4.69-8.79,19.66-33.39,47.35-49.38l18,19.75a48,48,0,0,0,63.66,70l14.73,16.2A112,112,0,0,1,128,192Zm6-95.43a8,8,0,0,1,3-15.72,48.16,48.16,0,0,1,38.77,42.64,8,8,0,0,1-7.22,8.71,6.39,6.39,0,0,1-.75,0,8,8,0,0,1-8-7.26A32.09,32.09,0,0,0,134,96.57Zm113.28,34.69c-.42.94-10.55,23.37-33.36,43.8a8,8,0,1,1-10.67-11.92A132.77,132.77,0,0,0,231.05,128a133.15,133.15,0,0,0-23.12-30.77C185.67,75.19,158.78,64,128,64a118.37,118.37,0,0,0-19.36,1.57A8,8,0,1,1,106,49.79,134,134,0,0,1,128,48c34.88,0,66.57,13.26,91.66,38.35,18.83,18.83,27.3,37.62,27.65,38.41A8,8,0,0,1,247.31,131.26Z"/></svg>
          </button>
          <button id="theme-toggle-btn" type="button" title="Toggle light/dark interface">
            <svg id="theme-icon-light" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor"><path d="M120,40V16a8,8,0,0,1,16,0V40a8,8,0,0,1-16,0Zm72,88a64,64,0,1,1-64-64A64.07,64.07,0,0,1,192,128Zm-16,0a48,48,0,1,0-48,48A48.05,48.05,0,0,0,176,128ZM58.34,69.66A8,8,0,0,0,69.66,58.34l-16-16A8,8,0,0,0,42.34,53.66Zm0,116.68-16,16a8,8,0,0,0,11.32,11.32l16-16a8,8,0,0,0-11.32-11.32ZM192,72a8,8,0,0,0,5.66-2.34l16-16a8,8,0,0,0-11.32-11.32l-16,16A8,8,0,0,0,192,72Zm5.66,114.34a8,8,0,0,0-11.32,11.32l16,16a8,8,0,0,0,11.32-11.32ZM48,128a8,8,0,0,0-8-8H16a8,8,0,0,0,0,16H40A8,8,0,0,0,48,128Zm80,80a8,8,0,0,0-8,8v24a8,8,0,0,0,16,0V216A8,8,0,0,0,128,208Zm112-88H216a8,8,0,0,0,0,16h24a8,8,0,0,0,0-16Z"/></svg>
            <svg id="theme-icon-dark" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" hidden><path d="M233.54,142.23a8,8,0,0,0-8-2,88.08,88.08,0,0,1-109.8-109.8,8,8,0,0,0-10-10,104.84,104.84,0,0,0-52.91,37A104,104,0,0,0,136,224a103.09,103.09,0,0,0,62.52-20.88,104.84,104.84,0,0,0,37-52.91A8,8,0,0,0,233.54,142.23ZM188.9,190.34A88,88,0,0,1,65.66,67.11a89,89,0,0,1,31.4-26A106,106,0,0,0,96,56,104.11,104.11,0,0,0,200,160a106,106,0,0,0,14.92-1.06A89,89,0,0,1,188.9,190.34Z"/></svg>
          </button>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
