<?xml version="1.0" encoding="UTF-8"?>
<!--
  Original glyph for this project (not from Phosphor) - one of three
  link-style icons cycled by the canvas's link-style toggle button (see
  web/shell/index.html, web/shell/src/main.ts). Stroke-based rather than
  filled, matching the shape it represents (a straight connecting line)
  rather than an icon-set convention.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round"><line x1="48" y1="208" x2="208" y2="48"/></svg>
